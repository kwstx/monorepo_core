global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway-service:8000

  - job_name: scoring-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - scoring-engine:9464

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
